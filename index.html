<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050207" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BL Talent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <title>Black Label Talent Portal</title>
    <link rel="stylesheet" href="./src/styles.css?v=20260624y" />
    <link rel="stylesheet" href="./src/brand.css?v=20260624y" />
    <link rel="stylesheet" href="./src/live.css?v=20260624y" />
    <link rel="stylesheet" href="./src/app-polish.css?v=20260624y" />
    <link rel="stylesheet" href="./src/mobile-polish.css?v=20260624y" />
    <link rel="stylesheet" href="./src/native-ui-pass.css?v=20260624y" />
    <link rel="stylesheet" href="./src/mission-control.css?v=20260624y" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      await import("./src/talent-config.js?v=20260624y");
      await import("./src/login-normalize.js?v=20260624y");
      await import("./src/app.js?v=20260624y");
      await import("./src/talent-fixes.js?v=20260624y");
      await import("./src/talent-communications.js?v=20260624y");
      await import("./src/mission-control.js?v=20260624y");
      await import("./src/push-registration-fix.js?v=20260624y");

      const patchHeroCopy = () => {
        const headline = document.querySelector(".hero h1");
        const copy = document.querySelector(".hero-copy");
        if (headline && headline.textContent.trim() === "Your Pay the Black Label Way.") {
          headline.textContent = "Black Label Talent";
        }
        if (copy && copy.textContent.trim() === "Your gigs, contracts, pay, and availability in one place.") {
          copy.remove();
        }
      };
      new MutationObserver(patchHeroCopy).observe(document.body, { childList: true, subtree: true });
      patchHeroCopy();
    </script>
  </body>
</html>
